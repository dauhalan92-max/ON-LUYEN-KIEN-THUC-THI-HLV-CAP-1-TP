<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kho báu Tri thức 2026</title>
<style>
:root {
  --bg1:#12122b; --bg2:#1b1245; --gold:#ffd36b; --gold2:#f5a524; --cyan:#69e9ff; --green:#2ee59d; --red:#ff5c7a; --card:rgba(18,25,54,.86); --glass:rgba(255,255,255,.09);
}
*{box-sizing:border-box} body{margin:0; font-family:Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; color:#fff; min-height:100vh; overflow-x:hidden; background:radial-gradient(circle at 50% 0%, #253078 0%, var(--bg1) 44%, #090916 100%);}
.hidden{display:none!important} button{font:inherit; cursor:pointer} .app{min-height:100vh; position:relative; isolation:isolate;}
.app:before{content:""; position:fixed; inset:0; background:radial-gradient(circle at 20% 25%, rgba(105,233,255,.15), transparent 26%),radial-gradient(circle at 80% 30%, rgba(255,211,107,.16), transparent 30%); pointer-events:none;}
.stars{position:fixed; inset:0; background-image:radial-gradient(#fff8 1px, transparent 1px),radial-gradient(#fff5 1px, transparent 1px); background-size:80px 80px,130px 130px; animation:starDrift 18s linear infinite; opacity:.5; z-index:-3} @keyframes starDrift{to{transform:translateY(80px)}}
.spark{position:fixed; width:5px; height:5px; border-radius:50%; background:var(--gold); filter:blur(.2px); animation:float 7s linear infinite; opacity:.75; z-index:-1} @keyframes float{0%{transform:translateY(110vh) scale(.4); opacity:0}10%{opacity:.75}100%{transform:translateY(-10vh) scale(1.1); opacity:0}}
.hero{min-height:100vh; display:grid; place-items:center; padding:28px; position:relative; overflow:hidden}
.library{position:absolute; inset:auto 0 0 0; height:54vh; background:linear-gradient(to top,#160b20 0 14%, transparent 14%),linear-gradient(90deg, transparent 0 6%, rgba(255,211,107,.18) 6% 7%, transparent 7% 18%, rgba(255,211,107,.12) 18% 19%, transparent 19% 31%, rgba(255,211,107,.12) 31% 32%, transparent 32% 68%, rgba(255,211,107,.12) 68% 69%, transparent 69% 81%, rgba(255,211,107,.12) 81% 82%, transparent 82% 93%, rgba(255,211,107,.18) 93% 94%, transparent 94%),radial-gradient(ellipse at center bottom, rgba(255,211,107,.25), transparent 60%); opacity:.95;}
.books{position:absolute; left:6%; right:6%; bottom:15vh; height:180px; background:repeating-linear-gradient(90deg,#763b85 0 18px,#c96465 18px 29px,#315c9e 29px 45px,#d8a939 45px 56px,#2b9a78 56px 72px); border:8px solid #7a5129; border-radius:16px; opacity:.65; box-shadow:0 30px 80px #000a}
.arch{position:absolute; left:50%; bottom:15vh; transform:translateX(-50%); width:min(540px,75vw); height:310px; border:18px solid #b58a55; border-bottom:0; border-radius:50% 50% 0 0 / 58% 58% 0 0; box-shadow:0 0 40px rgba(255,211,107,.35), inset 0 0 50px #0007; opacity:.8}
.chest{position:absolute; left:50%; bottom:12vh; transform:translateX(-50%); width:190px; height:118px; animation:glow 2.5s ease-in-out infinite alternate}
.chest:before{content:""; position:absolute; inset:0; border-radius:18px 18px 12px 12px; background:linear-gradient(#f6b94d 0 47%,#8a4b2b 47% 100%); border:5px solid #5a2a18; box-shadow:0 0 35px #ffd36b99}
.chest:after{content:"🔒"; position:absolute; font-size:48px; left:50%; top:46%; transform:translate(-50%,-50%); filter:drop-shadow(0 4px 3px #0007)} @keyframes glow{to{filter:drop-shadow(0 0 25px #ffd36b)}}
.globe{position:absolute; right:9vw; bottom:25vh; font-size:86px; animation:bob 4s ease-in-out infinite} .scroll{position:absolute; left:9vw; bottom:28vh; font-size:82px; transform:rotate(-12deg); animation:bob 4.5s ease-in-out infinite reverse} @keyframes bob{50%{transform:translateY(-12px) rotate(-4deg)}}
.introCard{width:min(900px,94vw); padding:44px 28px; text-align:center; border:1px solid rgba(255,255,255,.2); background:linear-gradient(180deg,rgba(18,25,54,.74),rgba(18,15,42,.82)); border-radius:32px; backdrop-filter:blur(10px); box-shadow:0 30px 100px #0009; position:relative; z-index:2}
.logoMark{font-size:84px; margin-bottom:12px; animation:pulse 2s ease-in-out infinite} @keyframes pulse{50%{transform:scale(1.04); filter:drop-shadow(0 0 20px #ffd36b)}}
h1{font-size:clamp(42px,7vw,82px); line-height:.95; margin:0; letter-spacing:.5px; color:var(--gold); text-shadow:0 5px 0 #6f4217,0 0 30px #ffd36b66} .subtitle{font-size:clamp(16px,2.4vw,24px); opacity:.95; margin:18px auto 28px; max-width:780px}
.primary{border:0; color:#231608; background:linear-gradient(180deg,#fff0a8,#f5a524); border-radius:999px; padding:18px 40px; font-weight:900; font-size:22px; box-shadow:0 12px 0 #8a4b12,0 24px 40px #0008; transition:.18s} .primary:hover{transform:translateY(-3px)} .primary:active{transform:translateY(6px); box-shadow:0 6px 0 #8a4b12}
.screen{min-height:100vh; padding:24px; position:relative}
.topbar{display:flex; align-items:center; justify-content:space-between; gap:12px; margin:0 auto 18px; max-width:1240px} .brand{display:flex; gap:12px; align-items:center; font-weight:900; color:var(--gold)} .brand .gem{font-size:34px} .pill{background:var(--glass); border:1px solid rgba(255,255,255,.15); border-radius:999px; padding:10px 16px; font-weight:700}
.menu{max-width:1040px; margin:0 auto; display:grid; grid-template-columns:repeat(3,1fr); gap:18px; padding-top:8vh} .mode{min-height:260px; border-radius:28px; padding:28px; border:1px solid rgba(255,255,255,.18); background:linear-gradient(145deg,rgba(255,255,255,.11),rgba(255,255,255,.04)); color:#fff; box-shadow:0 24px 60px #0006; text-align:left; position:relative; overflow:hidden} .mode:before{content:""; position:absolute; inset:-40% -30% auto auto; width:180px; height:180px; border-radius:50%; background:rgba(255,211,107,.18)} .mode b{display:block; font-size:30px; color:var(--gold); margin-bottom:10px} .mode span{font-size:18px; opacity:.9}
.gameWrap{max-width:1240px; margin:0 auto; display:grid; grid-template-columns:1fr 310px; gap:18px} .panel{background:var(--card); border:1px solid rgba(255,255,255,.14); border-radius:28px; padding:22px; box-shadow:0 26px 80px #0008}
.questTitle{font-size:24px; line-height:1.35; font-weight:900; margin:12px 0 20px} .zoneTitle{color:var(--gold); font-weight:900; letter-spacing:.5px} .answers{display:grid; gap:12px} .ans{display:flex; gap:12px; align-items:flex-start; width:100%; color:#fff; background:rgba(255,255,255,.08); border:2px solid rgba(255,255,255,.15); border-radius:18px; padding:16px; text-align:left; transition:.15s} .ans:hover{background:rgba(255,255,255,.13); transform:translateY(-1px)} .ans .lab{min-width:34px; height:34px; border-radius:50%; display:grid; place-items:center; background:rgba(255,255,255,.12); color:var(--gold); font-weight:900} .ans.correct{border-color:var(--green); background:rgba(46,229,157,.18)} .ans.wrong{border-color:var(--red); background:rgba(255,92,122,.16)} .feedback{margin-top:16px; padding:14px 16px; border-radius:16px; font-weight:800} .feedback.ok{background:rgba(46,229,157,.18); color:#90ffd3} .feedback.no{background:rgba(255,92,122,.16); color:#ffc0cb}
.controls{display:flex; flex-wrap:wrap; gap:10px; margin-top:18px} .smallBtn{border:0; border-radius:14px; padding:12px 16px; background:rgba(255,255,255,.12); color:#fff; font-weight:800} .submitBtn{background:linear-gradient(180deg,#7cf5c6,#2ee59d); color:#09251b}
.map{height:150px; border-radius:22px; background:linear-gradient(90deg,#413018,#234a30,#1d4564,#4d3a20,#112544,#43255f,#274354); position:relative; overflow:hidden; border:1px solid rgba(255,255,255,.16); margin-bottom:18px} .route{position:absolute; left:8%; right:8%; top:70px; height:8px; background:rgba(255,255,255,.3); border-radius:99px} .walker{position:absolute; top:40px; left:7%; font-size:44px; transition:left .45s ease} .gates{position:absolute; left:5%; right:5%; top:24px; display:flex; justify-content:space-between; font-size:28px} .crystals{display:grid; grid-template-columns:repeat(13,1fr); gap:6px; margin:14px 0} .crystal{height:12px; border-radius:20px; background:rgba(255,255,255,.15)} .crystal.on{background:linear-gradient(90deg,var(--cyan),var(--gold)); box-shadow:0 0 10px var(--cyan)}
.sideTitle{font-weight:900; color:var(--gold); margin-bottom:10px} .gridNums{display:grid; grid-template-columns:repeat(6,1fr); gap:6px; max-height:48vh; overflow:auto} .num{border:0; border-radius:10px; padding:9px 0; color:#fff; background:rgba(255,255,255,.08); font-weight:800} .num.done{background:rgba(46,229,157,.25)} .num.current{outline:2px solid var(--gold)}
.result{max-width:900px; margin:6vh auto; text-align:center} .treasure{font-size:110px; animation:openChest 1.2s ease-in-out infinite alternate} @keyframes openChest{to{transform:scale(1.08); filter:drop-shadow(0 0 28px #ffd36b)}} .stats{display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin:24px 0} .stat{background:rgba(255,255,255,.1); padding:18px; border-radius:20px} .stat b{display:block; font-size:32px; color:var(--gold)}
@media (max-width:900px){.menu{grid-template-columns:1fr} .gameWrap{grid-template-columns:1fr} .stats{grid-template-columns:repeat(2,1fr)} .globe,.scroll{display:none}}
</style>
</head>
<body><div class="app"><div class="stars"></div>
<section id="intro" class="hero">
  <div class="library"><div class="books"></div><div class="arch"></div><div class="chest"></div><div class="globe">🌍</div><div class="scroll">📜</div></div>
  <div class="introCard"><div class="logoMark">🏛️💎</div><h1>KHO BÁU<br>TRI THỨC 2026</h1><p class="subtitle">Bộ câu hỏi Kiến thức tổng hợp Huấn luyện viên Thành phố Đà Nẵng</p><button class="primary" onclick="showMenu()">▶ BẮT ĐẦU</button></div>
</section>
<section id="menu" class="screen hidden"><div class="topbar"><div class="brand"><span class="gem">🏛️</span><span>KHO BÁU TRI THỨC 2026</span></div><button class="smallBtn" onclick="showIntro()">Trang đầu</button></div><div class="menu">
<button class="mode" onclick="startGame('practice')"><b>📘 LUYỆN TẬP</b><span>50 câu ngẫu nhiên. Chọn đáp án hiện đúng/sai ngay.</span></button>
<button class="mode" onclick="startGame('order')"><b>📚 THEO THỨ TỰ</b><span>117 câu theo bộ đề gốc. Có chấm điểm và xem đáp án.</span></button>
<button class="mode" onclick="startGame('random')"><b>🎲 THỬ THÁCH</b><span>117 câu xáo trộn mới mỗi lần chơi.</span></button>
</div></section>
<section id="game" class="screen hidden"><div class="topbar"><div class="brand"><span class="gem">💎</span><span id="modeName">Đang chơi</span></div><div style="display:flex;gap:8px;align-items:center"><span class="pill" id="timer">00:00</span><button class="smallBtn" onclick="toPortal()">🏠</button></div></div><div class="gameWrap"><main class="panel"><div class="map"><div class="gates"><span>🏺</span><span>🗺️</span><span>🎭</span><span>📈</span><span>🌐</span><span>💻</span><span>🌍</span><span>🏆</span></div><div class="route"></div><div class="walker" id="walker">🧑‍🎓</div></div><div class="zoneTitle" id="zoneTitle">Khu tri thức</div><div class="questTitle" id="questionText"></div><div class="answers" id="answers"></div><div id="feedback" class="feedback hidden"></div><div class="controls"><button class="smallBtn" onclick="prevQ()">⬅ Câu trước</button><button class="smallBtn" onclick="nextQ()">Câu sau ➡</button><button class="smallBtn submitBtn" onclick="finishGame()">Nộp bài</button></div></main><aside class="panel"><div class="sideTitle">Tiến trình pha lê</div><div class="crystals" id="crystals"></div><div class="sideTitle">Danh sách câu</div><div class="gridNums" id="numGrid"></div></aside></div></section>
<section id="result" class="screen hidden"><div class="result panel"><div class="treasure">🏆💎</div><h1>KHO BÁU ĐÃ MỞ!</h1><p class="subtitle" id="rankText"></p><div class="stats"><div class="stat"><b id="sCorrect">0</b>Đúng</div><div class="stat"><b id="sWrong">0</b>Sai</div><div class="stat"><b id="sPercent">0%</b>Tỷ lệ</div><div class="stat"><b id="sTime">00:00</b>Thời gian</div></div><div class="controls" style="justify-content:center"><button class="primary" onclick="reviewAnswers()">📖 Xem đáp án</button><button class="primary" onclick="startGame(currentMode)">🔄 Chơi lại</button><button class="smallBtn" onclick="toPortal()">🏠 Cổng chính</button></div></div></section>
</div>
<script>
const QUESTIONS=[{"question": "Đến nền văn hóa nào trên đất nước ta, người nguyên thủy biết kĩ thuật làm gốm", "options": [{"label": "A", "text": "Văn hóa Hòa Bình", "correct": false}, {"label": "B", "text": "Văn hóa Bắc Sơn", "correct": true}, {"label": "C", "text": "Văn hóa Phùng Nguyên", "correct": false}, {"label": "D", "text": "Văn hóa Sơn Vi", "correct": false}], "id": 1}, {"question": "Những nền văn hóa tiêu biểu mở đầu thời đại kim khí và nông nghiệp trồng lúa trên đất nước ta là", "options": [{"label": "A", "text": "Hòa Bình, Bắc Sơn – Sa Huỳnh – Phùng Nguyên", "correct": false}, {"label": "B", "text": "Phùng Nguyên – Sa Huỳnh – Đồng Nai", "correct": true}, {"label": "C", "text": "Sơn Vi – Phùng Nguyên – Sa Huỳnh – Đồng Nai", "correct": false}, {"label": "D", "text": "Sơn Vi – Hòa Bình, Bắc Sơn – Sa Huỳnh – Đồng Nai", "correct": false}], "id": 2}, {"question": "Chất liệu để chế tác công cụ lãnh đạo phổ biến của cư dân Đông Sơn là", "options": [{"label": "A", "text": "Đồng thau, bắt đầu có sắt", "correct": true}, {"label": "B", "text": "Đồng đỏ và đồng thau", "correct": false}, {"label": "C", "text": "Đồng đỏ và sắt", "correct": false}, {"label": "D", "text": "Đồng và sắt", "correct": false}], "id": 3}, {"question": "Cuộc khởi nghĩa Hai Bà Trưng bùng nổ tại", "options": [{"label": "A", "text": "Mê Linh (Vĩnh Phúc)", "correct": false}, {"label": "B", "text": "Cổ Loa (Đông Anh – Hà Nội)", "correct": false}, {"label": "C", "text": "Hát Môn (Phúc Thọ - Hà Nội)", "correct": true}, {"label": "D", "text": "Luy Lâu (Thuận Thành – Bắc Ninh)", "correct": false}], "id": 4}, {"question": "Từ sau chiến thắng Bạch Đằng (938) đến thế kỉ XV, nhân dân ta còn phải tiến hành nhiều cuộc kháng chiến chống quân xâm lược đó là", "options": [{"label": "A", "text": "Hai lần chống Tống, ba lần chống Mông – Nguyên và chống Minh", "correct": true}, {"label": "B", "text": "Chống Tống, ba lần chống Mông – Nguyên, chống Minh và chống Xiêm", "correct": false}, {"label": "C", "text": "Hai l let quiz=[], current=0, selected={}, locked={}, startTime=0, timerInt=null, currentMode='practice', review=false;
const zones=['🏺 CỔ SỬ','🗺️ ĐỊA LÝ','🎭 VĂN HÓA','📈 KINH TẾ','🌐 ĐẤT NƯỚC HÔM NAY','💻 CÔNG NGHỆ','🌍 NGOẠI NGỮ'];
function $id(x){return document.getElementById(x)}
function shuffle(a){let b=[...a]; for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1)); [b[i],b[j]]=[b[j],b[i]]} return b}
function show(id){['intro','menu','game','result'].forEach(s=>$id(s).classList.add('hidden')); $id(id).classList.remove('hidden')}
function showIntro(){clearInterval(timerInt); show('intro')} function showMenu(){clearInterval(timerInt); show('menu')}
function prepareQuestion(q){let opts=shuffle(q.options).map((o,i)=>({...o, showLabel:String.fromCharCode(65+i)})); return {...q, options:opts}}
function startGame(mode){currentMode=mode; review=false; selected={}; locked={}; current=0; let base=[...QUESTIONS]; if(mode==='practice') base=shuffle(base).slice(0,50); if(mode==='random') base=shuffle(base); quiz=base.map(prepareQuestion); startTime=Date.now(); $id('modeName').textContent= mode==='practice'?'📘 Luyện tập':mode==='order'?'📚 Theo thứ tự':'🎲 Thử thách'; buildNav(); buildCrystals(); show('game'); renderQ(); clearInterval(timerInt); timerInt=setInterval(updateTimer,1000); updateTimer();}
function elapsed(){return Math.floor((Date.now()-startTime)/1000)} function fmt(sec){let m=String(Math.floor(sec/60)).padStart(2,'0'), s=String(sec%60).padStart(2,'0'); return m+':'+s} function updateTimer(){$id('timer').textContent=fmt(elapsed())}
function zoneFor(i){let p=i/Math.max(1,quiz.length); return Math.min(6,Math.floor(p*7))}
function renderQ(){let q=quiz[current]; $id('zoneTitle').textContent=zones[zoneFor(current)]+` • Câu ${current+1}/${quiz.length}`; $id('questionText').textContent=q.question; let ans=$id('answers'); ans.innerHTML=''; let chose=selected[current]; q.options.forEach((o,idx)=>{let btn=document.createElement('button'); btn.className='ans'; let isChosen=chose===idx; if(locked[current]||review){if(o.correct) btn.classList.add('correct'); else if(isChosen) btn.classList.add('wrong')} btn.innerHTML=`<span class="lab">${o.showLabel}</span><span>${escapeHtml(o.text)}</span>`; btn.onclick=()=>choose(idx); ans.appendChild(btn)}); let fb=$id('feedback'); fb.classList.add('hidden'); if(locked[current]||review){let ok=q.options[chose]?.correct; let correct=q.options.find(o=>o.correct); fb.className='feedback '+(ok?'ok':'no'); fb.innerHTML=ok?'✅ Chính xác!':'❌ Chưa chính xác. Đáp án đúng: <b>'+correct.showLabel+'. '+escapeHtml(correct.text)+'</b>'; fb.classList.remove('hidden')} updateNav(); updateProgress();}
function choose(idx){if(review) return; if(locked[current]) return; selected[current]=idx; locked[current]=true; renderQ();}
function nextQ(){if(current<quiz.length-1){current++; renderQ()}} function prevQ(){if(current>0){current--; renderQ()}}
function buildNav(){let g=$id('numGrid'); g.innerHTML=''; quiz.forEach((_,i)=>{let b=document.createElement('button'); b.className='num'; b.textContent=i+1; b.onclick=()=>{current=i; renderQ()}; g.appendChild(b)})}
function updateNav(){[...$id('numGrid').children].forEach((b,i)=>{b.className='num'+(selected[i]!==undefined?' done':'')+(i===current?' current':'')})}
function buildCrystals(){let c=$id('crystals'); c.innerHTML=''; for(let i=0;i<quiz.length;i++){let d=document.createElement('div'); d.className='crystal'; c.appendChild(d)}}
function updateProgress(){let answered=Object.keys(selected).length; let percent= quiz.length<=1?0: answered/(quiz.length); $id('walker').style.left=(7+percent*82)+'%'; [...$id('crystals').children].forEach((d,i)=>d.className='crystal'+(selected[i]!==undefined?' on':''));}
function finishGame(){clearInterval(timerInt); let correct=0; quiz.forEach((q,i)=>{let idx=selected[i]; if(idx!==undefined && q.options[idx]?.correct) correct++}); let wrong=quiz.length-correct; let pct=Math.round(correct*100/quiz.length); $id('sCorrect').textContent=correct+'/'+quiz.length; $id('sWrong').textContent=wrong; $id('sPercent').textContent=pct+'%'; $id('sTime').textContent=fmt(elapsed()); $id('rankText').textContent=rank(pct); show('result')}
function rank(p){if(p===100)return'🥇 Bậc thầy Tri thức'; if(p>=90)return'🥈 Học giả xuất sắc'; if(p>=80)return'🥉 Nhà khám phá tri thức'; if(p>=70)return'🎖 Người học chăm chỉ'; return'📘 Tiếp tục rèn luyện'}
function reviewAnswers(){review=true; current=0; show('game'); renderQ()}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
for(let i=0;i<42;i++){let sp=document.createElement('span'); sp.className='spark'; sp.style.left=Math.random()*100+'vw'; sp.style.animationDelay=(-Math.random()*7)+'s'; sp.style.animationDuration=(5+Math.random()*7)+'s'; document.body.appendChild(sp)}
